<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/base16/grayscale-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="player/csPlayer.css">
    <title>Pregador Preparado</title>
</head>
<body>
<nav>
 <span><img src="csPlayer.png"><h1>Pregador Preparado</h1></span>
</nav>



<div class="container">
    <div class="video-box">
    <div id="videoPlayer" class="video"></div>
    
    </div>

    <div class="divVideos"></div>

</div>

<script src="player/csPlayer.js"></script>
<script>
//custom script 
function $(selector,parent){
    var x;
    try{
        const elements = document.querySelectorAll(selector);
        if(elements.length == 1){
            x = elements[0]
        }
        else if(elements.length == 0){
            x = null
        }
        else{
            x = elements
        }
    }catch(error){
        x = error;
    }
    return x;
}

// Carregar e renderizar vídeos do arquivo JSON
async function loadVideosFromJSON() {
    try {
        const response = await fetch('videos.json');
        const data = await response.json();

        // Inicializar o player com o vídeo em destaque
        initializePlayerWithFeatured(data.featured);
        
        // Renderizar categorias e vídeos
        renderVideosCategories(data.categories);
    } catch (error) {
        console.error('Erro ao carregar vídeos:', error);
    }
}

// Renderizar categorias e seus vídeos
function renderVideosCategories(categories) {
    const section = $(".divVideos");
    section.innerHTML = ''; // Limpar conteúdo anterior
    
    categories.forEach(category => {
        const categoryDiv = document.createElement('div');
        categoryDiv.className = 'category';
        categoryDiv.id = `category-${category.id}`;
        
        const categoryTitle = document.createElement('h2');
        categoryTitle.textContent = category.title;
        categoryTitle.style.color = '#e1e1e1';
        categoryTitle.style.fontSize = '20px';
        categoryTitle.style.marginBottom = '1.5rem';
        categoryTitle.style.marginTop = '2rem';
        categoryTitle.style.fontWeight = '600';
        categoryTitle.style.letterSpacing = '0.5px';
        categoryTitle.style.borderBottom = '2px solid rgba(255,255,255,0.2)';
        categoryTitle.style.paddingBottom = '0.5rem';
        categoryDiv.appendChild(categoryTitle);
        
        const videosContainer = document.createElement('div');
        videosContainer.className = 'videos-grid';
        
        category.videos.forEach(video => {
            const videoElement = createVideoItem(video);
            videosContainer.appendChild(videoElement);
        });
        
        categoryDiv.appendChild(videosContainer);
        section.appendChild(categoryDiv);
    });
}

// Criar elemento de vídeo
function createVideoItem(video) {
    const videoDiv = document.createElement('div');
    videoDiv.className = 'video-item';
    //videoDiv.onclick = () => playVideoDemo(video.id, video.title);

    
    videoDiv.onclick = () => playVideoDemo(video.id, video.title, video.start);

    
    const thumbnail = document.createElement('img');
    thumbnail.src = `https://img.youtube.com/vi/${video.id}/maxresdefault.jpg`;
    thumbnail.alt = video.title;
    thumbnail.className = 'video-thumbnail';
    thumbnail.onerror = function() {
        this.src = `https://img.youtube.com/vi/${video.id}/hqdefault.jpg`;
    };
    
    const playIcon = document.createElement('div');
    playIcon.className = 'play-icon';
    playIcon.innerHTML = '▶';

    // adiciona atributo start ao elemento
    if(video.start){
        videoDiv.dataset.start = video.start;
    }
    
    const info = document.createElement('div');
    info.className = 'video-info';
    
    const title = document.createElement('h3');
    title.textContent = video.title;
    
    const description = document.createElement('p');
    description.textContent = video.description;
    
    info.appendChild(title);
    info.appendChild(description);
    
    videoDiv.appendChild(thumbnail);
    videoDiv.appendChild(playIcon);
    videoDiv.appendChild(info);
    
    return videoDiv;
}

// Função para reproduzir vídeo no demo
function playVideoDemo(videoId, title, start) {
    csPlayer.changeVideo("videoPlayer", videoId, start ? parseInt(start) : 1);
    
    // Scroll para o player
    document.getElementById('videoPlayer').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Inicializar o player com o vídeo em destaque
function initializePlayerWithFeatured(featured) {
    if (!featured || !featured.id) return;
    
    var x = csPlayer.init("videoPlayer", {
        defaultId: featured.id,
        thumbnail: true,
        theme: "default",
        loop: false,
        start: featured.start ? parseInt(featured.start) : 0,
        autoPlay: featured.autoPlay ? true : false
    });
}

// Carregar vídeos quando a página estiver pronta
document.addEventListener('DOMContentLoaded', loadVideosFromJSON);
</script>
</body>
</html>
